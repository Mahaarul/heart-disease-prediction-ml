<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Website Homepage HTML and CSS | CodingNepal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <h2 class="logo"><a href="#">Cardio Predict</a></h2>
            <input type="checkbox" id="menu-toggle" />
            <label for="menu-toggle" id="hamburger-btn">
                <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24">
                    <path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </label>
            <ul class="links">
                <li><a href="#">Home</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="#">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <section class="hero-section">
        <div class="hero">
            <h2>Heart Disease Prediction</h2>
            <p>
                "Heart Health is Wealth: Predict to Protect!"
            </p>
            <div class="buttons">
                <a href="/home" class="join">Predict</a>
            </div>
        </div>
        <div class="img">
          <img src="{{ url_for('static', filename='image/he.jpg') }}" alt="hero image" />
      </div>
    </section>
</body>
</html>
